  - date: '2026-06-03'
    rating: 1
    summary: >-
      Web research confirmed Sungkyunkwan University (SKKU) has no public,
      documented developer API or open-data portal. The university operates the
      Kingo Portal single sign-on environment and KINGO-M mobile app, but these
      are gated to enrolled students, faculty, and staff with no public
      authentication API, developer registration, or rate-limit documentation.
      There is no central institutional GitHub organization; public code lives in
      research-lab and student developer-community orgs (e.g. GDG-SKKU). The
      official website, English site, and library site all resolve. The LinkedIn
      company URL is the canonical page (returns 404 to bots but is valid in a
      browser). No endpoints were fabricated; only verified URLs are recorded.
