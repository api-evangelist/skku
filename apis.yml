aid: skku
name: Sungkyunkwan University
description: >-
  Sungkyunkwan University (SKKU) is a private research university in Seoul and
  Suwon, South Korea, with roots dating to 1398, and is ranked #123 in the QS
  World University Rankings 2025. Its digital footprint centers on the Kingo
  Portal single sign-on environment, the iCampus learning system, the university
  library, and the KINGO-M mobile app. As of this review SKKU publishes no
  public, documented developer API or open-data portal; integration and identity
  services (Kingo SSO, eduroam) are gated to enrolled students, faculty, and
  staff. Public software activity exists mainly through research-lab and student
  developer-community GitHub organizations rather than a central institutional
  developer program.
